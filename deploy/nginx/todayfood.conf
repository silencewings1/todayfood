# ============================================================
# todayfood nginx 配置模板
#
# 生产环境 URL 结构：
#   前端：https://snowflow.cloud/projects/todayfood/
#   API： https://snowflow.cloud/projects/todayfood/api/
#   后台：https://snowflow.cloud/projects/todayfood/admin/
#
# 部署方式：
#   1. 复制到 /etc/nginx/sites-available/todayfood.conf
#   2. 在 server { } 块中 include 此文件，或直接将 location 块粘贴到主配置
#   3. nginx -t && systemctl reload nginx
#
# 前提：
#   - 前端构建产物已部署到 /var/www/todayfood/（由 deploy.sh --frontend 完成）
#   - 后端 FastAPI 运行在 127.0.0.1:9081（由 todayfood.service 启动）
#   - SSL 证书由主 server 块或 certbot 管理，此文件只包含 location 块
# ============================================================

# ------ 前端静态资源（Vite 构建产物）------
# /projects/todayfood/ → /var/www/todayfood/
# try_files 支持 SPA history 路由（当前为 hash 路由，也兼容）
location /projects/todayfood/ {
    alias /var/www/todayfood/;
    index index.html;
    try_files $uri $uri/ /projects/todayfood/index.html;

    # 静态资源缓存（带 hash 的文件名可长期缓存）
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        alias /var/www/todayfood/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ------ 业务 API → FastAPI (port 9081)------
# /projects/todayfood/api/ → http://127.0.0.1:9081/api/
#
# 注意：前端构建时需设置 VITE_API_BASE=/projects/todayfood/api
#   cd frontend && VITE_API_BASE=/projects/todayfood/api npm run build
# 或在 frontend/.env.production 中写入该值
location /projects/todayfood/api/ {
    proxy_pass http://127.0.0.1:9081/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
}

# ------ 后台管理 → FastAPI (port 9081)------
# /projects/todayfood/admin/ → http://127.0.0.1:9081/admin/
# admin 前端页面 + admin API（/admin/api/*）+ admin 静态资源均由后端处理
# admin 前端的 API 路径基于 window.location.pathname 动态计算，整体代理即可
location /projects/todayfood/admin/ {
    proxy_pass http://127.0.0.1:9081/admin/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
}

# ------ 兜底：如果前端构建时 VITE_API_BASE=/api（绝对路径）------
