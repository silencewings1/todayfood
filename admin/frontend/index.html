<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日宜吃 · 后台管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f7; color: #333; font-size: 14px; }

/* 登录页 */
.login-wrap { max-width: 360px; margin: 120px auto; padding: 32px; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
.login-wrap h1 { font-size: 20px; text-align: center; margin-bottom: 24px; color: #c4622d; }
.login-wrap input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.login-wrap button { width: 100%; padding: 10px; background: #c4622d; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
.login-wrap button:hover { background: #b5562a; }
.login-wrap .err { color: #e74c3c; font-size: 12px; text-align: center; min-height: 18px; }

/* 主界面 */
.app { display: none; }
.header { background: #fff; padding: 12px 24px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 16px; color: #c4622d; }
.header .actions { display: flex; gap: 12px; align-items: center; }
.header .user { color: #888; font-size: 12px; }
.btn { padding: 6px 14px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn:hover { background: #f5f5f7; }
.btn-primary { background: #c4622d; color: #fff; border-color: #c4622d; }
.btn-primary:hover { background: #b5562a; }
.btn-danger { color: #e74c3c; border-color: #e74c3c; }
.btn-danger:hover { background: #fdf0ef; }

.tabs { display: flex; gap: 4px; padding: 12px 24px 0; background: #fff; border-bottom: 1px solid #eee; }
.tab { padding: 8px 20px; cursor: pointer; border-bottom: 2px solid transparent; color: #666; }
.tab.active { color: #c4622d; border-bottom-color: #c4622d; }

.content { padding: 16px 24px; }

/* 统计卡片 */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: #fff; padding: 16px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.stat-card .label { color: #888; font-size: 12px; margin-bottom: 6px; }
.stat-card .value { font-size: 24px; font-weight: 600; color: #333; }
.stat-card .sub { color: #aaa; font-size: 11px; margin-top: 4px; }

/* 配置展示 */
.config-box { background: #fff; padding: 16px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.config-box h3 { font-size: 14px; margin-bottom: 12px; color: #c4622d; }
.config-row { display: flex; padding: 6px 0; border-bottom: 1px solid #f5f5f7; }
.config-row .k { width: 140px; color: #888; }
.config-row .v { flex: 1; word-break: break-all; }
.config-row .tag { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; }
.tag-on { background: #e8f5e9; color: #2e7d32; }
.tag-off { background: #fbe9e7; color: #c62828; }

/* 筛选条 */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.filters input, .filters select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
.filters input { width: 160px; }
.filters select { width: 110px; }

/* 表格 */
.table-wrap { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
table { width: 100%; border-collapse: collapse; }
th { background: #fafafa; padding: 10px 12px; text-align: left; font-size: 12px; color: #888; font-weight: 500; border-bottom: 1px solid #eee; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid #f5f5f7; font-size: 13px; vertical-align: top; }
tr:hover td { background: #fafafa; }
.td-time { color: #888; font-size: 12px; white-space: nowrap; }
.td-path { font-family: monospace; font-size: 12px; }
.td-status { font-weight: 600; }
.status-2xx { color: #2e7d32; }
.status-4xx { color: #f57c00; }
.status-5xx { color: #c62828; }
.td-cost { color: #888; font-size: 12px; }
.tag-success { color: #2e7d32; }
.tag-fail { color: #c62828; }
.tag-fallback { color: #f57c00; }
.truncate { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }

/* 分页 */
.pagination { display: flex; gap: 8px; justify-content: center; align-items: center; margin-top: 16px; }
.pagination .info { color: #888; font-size: 12px; }

/* 详情弹窗 */
.modal-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; }
.modal-mask.show { display: flex; align-items: center; justify-content: center; }
.modal { background: #fff; border-radius: 8px; width: 80%; max-width: 720px; max-height: 80vh; overflow: auto; }
.modal-head { padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
.modal-head h3 { font-size: 14px; color: #c4622d; }
.modal-body { padding: 16px 20px; }
.modal-body .row { margin-bottom: 12px; }
.modal-body .row .k { color: #888; font-size: 12px; margin-bottom: 4px; }
.modal-body .row .v { background: #f9f9f9; padding: 8px 10px; border-radius: 4px; font-family: monospace; font-size: 12px; word-break: break-all; white-space: pre-wrap; max-height: 200px; overflow: auto; }
.empty { text-align: center; padding: 40px; color: #aaa; }
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-wrap" id="loginPage">
  <h1>今日宜吃 · 后台管理</h1>
  <input type="text" id="username" placeholder="账号">
  <input type="password" id="password" placeholder="密码">
  <button onclick="doLogin()">登 录</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- 主界面 -->
<div class="app" id="appPage">
  <div class="header">
    <h1>今日宜吃 · 后台管理</h1>
    <div class="actions">
      <span class="user" id="user"></span>
      <button class="btn" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="status" onclick="switchTab('status')">系统状态</div>
    <div class="tab" data-tab="api" onclick="switchTab('api')">API 日志</div>
    <div class="tab" data-tab="ai" onclick="switchTab('ai')">AI 调用</div>
  </div>

  <div class="content">
    <!-- 系统状态 -->
    <div id="tab-status" class="tab-pane">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="config-box">
        <h3>AI 配置</h3>
        <div id="aiConfig"></div>
      </div>
    </div>

    <!-- API 日志 -->
    <div id="tab-api" class="tab-pane" style="display:none">
      <div class="filters">
        <select id="apiMethod">
          <option value="">全部方法</option>
          <option value="GET">GET</option>
          <option value="POST">POST</option>
        </select>
        <select id="apiStatus">
          <option value="">全部状态</option>
          <option value="200">200</option>
          <option value="401">401</option>
          <option value="404">404</option>
          <option value="500">500</option>
        </select>
        <input type="text" id="apiPath" placeholder="路径筛选">
        <input type="text" id="apiKeyword" placeholder="关键字">
        <button class="btn btn-primary" onclick="loadApiLogs(1)">查询</button>
        <button class="btn btn-danger" onclick="clearLogs('api')">清空</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>时间</th><th>方法</th><th>路径</th><th>客户端</th><th>状态</th><th>耗时</th><th>请求体</th>
          </tr></thead>
          <tbody id="apiLogsBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="apiPagination"></div>
    </div>

    <!-- AI 调用 -->
    <div id="tab-ai" class="tab-pane" style="display:none">
      <div class="filters">
        <select id="aiAgent">
          <option value="">全部 Agent</option>
          <option value="note_parser">note_parser</option>
          <option value="reason_writer">reason_writer</option>
          <option value="sign_generator">sign_generator</option>
        </select>
        <select id="aiSuccess">
          <option value="">全部状态</option>
          <option value="1">成功</option>
          <option value="0">失败</option>
        </select>
        <select id="aiFallback">
          <option value="">全部</option>
          <option value="1">走兜底</option>
          <option value="0">未兜底</option>
        </select>
        <button class="btn btn-primary" onclick="loadAiLogs(1)">查询</button>
        <button class="btn btn-danger" onclick="clearLogs('ai')">清空</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>时间</th><th>Agent</th><th>状态</th><th>耗时</th><th>Prompt</th><th>响应</th>
          </tr></thead>
          <tbody id="aiLogsBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="aiPagination"></div>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-mask" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">详情</h3>
      <button class="btn" onclick="closeModal()">关闭</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// 根据当前页面 URL 计算子路径前缀，使 admin 可挂在任意子路径下
// 例如 /projects/todayfood/admin/  ->  /projects/todayfood/admin/api
const API = window.location.pathname.replace(/\/$/, '') + '/api';
const LOG_PAGE_SIZE = 10;
let pollTimer = null;

// ===== 登录 =====
async function doLogin() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  try {
    const r = await fetch(API + '/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password}),
      credentials: 'include',
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      errEl.textContent = d.detail || '登录失败';
      return;
    }
    showApp();
  } catch (e) {
    errEl.textContent = '网络错误';
  }
}

async function logout() {
  await fetch(API + '/logout', {method: 'POST', credentials: 'include'});
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'block';
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function showApp() {
  // 先验证 session
  try {
    const r = await fetch(API + '/status', {credentials: 'include'});
    if (r.status === 401) {
      document.getElementById('loginPage').style.display = 'block';
      document.getElementById('appPage').style.display = 'none';
      return;
    }
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').style.display = 'block';
    document.getElementById('user').textContent = '已登录';
    switchTab('status');
    // 启动轮询
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => {
      const active = document.querySelector('.tab.active');
      if (active) {
        const tab = active.dataset.tab;
        if (tab === 'status') loadStatus();
        else if (tab === 'api') loadApiLogs(currentApiPage);
        else if (tab === 'ai') loadAiLogs(currentAiPage);
      }
    }, 5000);
  } catch (e) {}
}

// ===== Tab 切换 =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  if (tab === 'status') loadStatus();
  else if (tab === 'api') loadApiLogs(1);
  else if (tab === 'ai') loadAiLogs(1);
}

// ===== 系统状态 =====
async function loadStatus() {
  try {
    const r = await fetch(API + '/status', {credentials: 'include'});
    if (r.status === 401) { logout(); return; }
    const d = await r.json();
    const s = d.stats, c = d.ai_config;
    const statsHtml = [
      ['API 总请求数', s.api_total, `近1小时 ${s.api_1h}`],
      ['AI 调用数', s.ai_total, `近1小时 ${s.ai_1h}`],
      ['AI 成功率', s.ai_success_rate.toFixed(1) + '%', `兜底 ${s.ai_fallback_count} 次`],
      ['API 平均耗时', s.avg_api_cost_ms.toFixed(1) + ' ms', ''],
      ['AI 平均耗时', s.avg_ai_cost_ms.toFixed(1) + ' ms', ''],
    ].map(([l, v, sub]) => `<div class="stat-card"><div class="label">${l}</div><div class="value">${v}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`).join('');
    document.getElementById('statsGrid').innerHTML = statsHtml;

    const agents = Object.entries(c.agents).map(([k, v]) =>
      `<div class="config-row"><span class="k">${k}</span><span class="v"><span class="tag ${v.enabled ? 'tag-on' : 'tag-off'}">${v.enabled ? 'ON' : 'OFF'}</span> model=${v.model} temp=${v.temperature}</span></div>`
    ).join('');
    document.getElementById('aiConfig').innerHTML = `
      <div class="config-row"><span class="k">启用状态</span><span class="v"><span class="tag ${c.enabled ? 'tag-on' : 'tag-off'}">${c.enabled ? '已启用' : '已关闭'}</span></span></div>
      <div class="config-row"><span class="k">Provider</span><span class="v">${c.provider}</span></div>
      <div class="config-row"><span class="k">协议</span><span class="v">${c.api_protocol}</span></div>
      <div class="config-row"><span class="k">模型</span><span class="v">${c.model}</span></div>
      <div class="config-row"><span class="k">Base URL</span><span class="v">${c.base_url}</span></div>
      <div class="config-row"><span class="k">超时</span><span class="v">${c.ai_timeout} 秒</span></div>
      <div class="config-row"><span class="k">API Key</span><span class="v">${c.has_api_key ? '已配置' : '未配置'}</span></div>
      ${agents}
    `;
  } catch (e) {}
}

// ===== API 日志 =====
let currentApiPage = 1;
async function loadApiLogs(page) {
  currentApiPage = page;
  const method = document.getElementById('apiMethod').value;
  const status = document.getElementById('apiStatus').value;
  const path = document.getElementById('apiPath').value;
  const keyword = document.getElementById('apiKeyword').value;
  const params = new URLSearchParams({page, page_size: LOG_PAGE_SIZE, method, status, path, keyword});
  try {
    const r = await fetch(`${API}/api-logs?${params}`, {credentials: 'include'});
    if (r.status === 401) { logout(); return; }
    const d = await r.json();
    const body = d.items.map(it => {
      const sc = it.status >= 500 ? '5xx' : it.status >= 400 ? '4xx' : '2xx';
      const time = new Date(it.ts * 1000).toLocaleString('zh-CN', {hour12: false});
      return `<tr onclick="showDetail(${JSON.stringify(it).replace(/"/g,'&quot;')})" style="cursor:pointer">
        <td class="td-time">${time}</td>
        <td>${it.method}</td>
        <td class="td-path">${it.path}</td>
        <td>${it.client || '-'}</td>
        <td class="td-status status-${sc}">${it.status}</td>
        <td class="td-cost">${(it.cost_ms||0).toFixed(1)}ms</td>
        <td class="truncate">${escapeHtml(it.req_body || '')}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="7" class="empty">暂无数据</td></tr>';
    document.getElementById('apiLogsBody').innerHTML = body;
    renderPagination('apiPagination', page, d.total, LOG_PAGE_SIZE, loadApiLogs);
  } catch (e) {}
}

// ===== AI 日志 =====
let currentAiPage = 1;
async function loadAiLogs(page) {
  currentAiPage = page;
  const agent = document.getElementById('aiAgent').value;
  const success = document.getElementById('aiSuccess').value;
  const fallback = document.getElementById('aiFallback').value;
  const params = new URLSearchParams({page, page_size: LOG_PAGE_SIZE, agent, success, fallback});
  try {
    const r = await fetch(`${API}/ai-logs?${params}`, {credentials: 'include'});
    if (r.status === 401) { logout(); return; }
    const d = await r.json();
    const body = d.items.map(it => {
      const time = new Date(it.ts * 1000).toLocaleString('zh-CN', {hour12: false});
      const statusTag = it.success
        ? '<span class="tag-success">成功</span>'
        : '<span class="tag-fail">失败</span>';
      const fallbackTag = it.fallback ? '<span class="tag-fallback">兜底</span>' : '';
      return `<tr onclick="showDetail(${JSON.stringify(it).replace(/"/g,'&quot;')})" style="cursor:pointer">
        <td class="td-time">${time}</td>
        <td>${it.agent}</td>
        <td>${statusTag} ${fallbackTag}</td>
        <td class="td-cost">${(it.cost_ms||0).toFixed(1)}ms</td>
        <td class="truncate">${escapeHtml(it.prompt || '')}</td>
        <td class="truncate">${escapeHtml(it.response || '')}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="6" class="empty">暂无数据</td></tr>';
    document.getElementById('aiLogsBody').innerHTML = body;
    renderPagination('aiPagination', page, d.total, LOG_PAGE_SIZE, loadAiLogs);
  } catch (e) {}
}

// ===== 清空日志 =====
async function clearLogs(table) {
  if (!confirm(`确认清空${table === 'api' ? 'API' : 'AI'}日志？`)) return;
  try {
    await fetch(API + '/clear', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({table}),
      credentials: 'include',
    });
    alert('已清空');
    if (table === 'api') loadApiLogs(1);
    else loadAiLogs(1);
  } catch (e) {}
}

// ===== 分页 =====
function renderPagination(elId, page, total, pageSize, loadFn) {
  const pages = Math.ceil(total / pageSize);
  const el = document.getElementById(elId);
  if (pages <= 1) { el.innerHTML = `<span class="info">共 ${total} 条</span>`; return; }
  el.innerHTML = `
    <button class="btn" ${page <= 1 ? 'disabled' : ''} onclick="${loadFn.name}(${page - 1})">上一页</button>
    <span class="info">第 ${page} / ${pages} 页 · 共 ${total} 条</span>
    <button class="btn" ${page >= pages ? 'disabled' : ''} onclick="${loadFn.name}(${page + 1})">下一页</button>
  `;
}

// ===== 详情弹窗 =====
function showDetail(data) {
  const isApi = 'method' in data;
  document.getElementById('modalTitle').textContent = isApi ? 'API 调用详情' : 'AI 调用详情';
  let html = '';
  if (isApi) {
    html = `
      <div class="row"><div class="k">时间</div><div class="v">${new Date(data.ts * 1000).toLocaleString('zh-CN', {hour12: false})}</div></div>
      <div class="row"><div class="k">方法 · 路径</div><div class="v">${data.method} ${data.path}</div></div>
      <div class="row"><div class="k">客户端 · UA</div><div class="v">${data.client || '-'} · ${escapeHtml(data.ua || '-')}</div></div>
      <div class="row"><div class="k">状态码 · 耗时</div><div class="v">${data.status} · ${(data.cost_ms||0).toFixed(1)}ms</div></div>
      <div class="row"><div class="k">请求体</div><div class="v">${escapeHtml(data.req_body || '(空)')}</div></div>
      <div class="row"><div class="k">响应摘要</div><div class="v">${escapeHtml(data.resp_summary || '(空)')}</div></div>
    `;
  } else {
    html = `
      <div class="row"><div class="k">时间</div><div class="v">${new Date(data.ts * 1000).toLocaleString('zh-CN', {hour12: false})}</div></div>
      <div class="row"><div class="k">Agent · 耗时</div><div class="v">${data.agent} · ${(data.cost_ms||0).toFixed(1)}ms</div></div>
      <div class="row"><div class="k">状态</div><div class="v">${data.success ? '成功' : '失败'} ${data.fallback ? '· 走兜底' : ''}</div></div>
      <div class="row"><div class="k">错误</div><div class="v">${escapeHtml(data.error || '(无)')}</div></div>
      <div class="row"><div class="k">Prompt</div><div class="v">${escapeHtml(data.prompt || '(空)')}</div></div>
      <div class="row"><div class="k">响应</div><div class="v">${escapeHtml(data.response || '(空)')}</div></div>
      <div class="row"><div class="k">解析结果</div><div class="v">${escapeHtml(data.parsed || '(空)')}</div></div>
    `;
  }
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 启动时检查登录状态
showApp();
</script>
</body>
</html>
